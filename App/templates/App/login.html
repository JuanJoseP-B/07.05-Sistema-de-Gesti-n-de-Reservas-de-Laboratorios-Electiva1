<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ReservasLab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0a4fcf 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-10 col-md-7 col-lg-6">

            <!-- Encabezado -->
            <div class="text-center text-white mb-4">
                <i class="bi bi-building-check" style="font-size:3rem;"></i>
                <h2 class="fw-bold mt-2">ReservasLab</h2>
                <p class="opacity-75">Sistema de Gestión de Laboratorios</p>
            </div>

            <!-- Tabs: Docente / Administrador -->
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <ul class="nav nav-tabs nav-fill" id="loginTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active py-3 fw-semibold" id="docente-tab"
                                data-bs-toggle="tab" data-bs-target="#docente"
                                type="button" role="tab">
                            <i class="bi bi-person-video3"></i> Docente
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link py-3 fw-semibold" id="admin-tab"
                                data-bs-toggle="tab" data-bs-target="#administrador"
                                type="button" role="tab">
                            <i class="bi bi-shield-lock"></i> Administrador
                        </button>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- Tab Docente -->
                    <div class="tab-pane fade show active p-4" id="docente" role="tabpanel">
                        {% if form.errors %}
                        <div class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle"></i> Usuario o contraseña incorrectos.
                        </div>
                        {% endif %}
                        <form method="post">
                            {% csrf_token %}
                            <input type="hidden" name="next" value="{{ next }}">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" name="username" class="form-control"
                                           required autofocus placeholder="Tu nombre de usuario">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" name="password" class="form-control"
                                           required placeholder="Tu contraseña">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                                <i class="bi bi-box-arrow-in-right"></i> Ingresar como Docente
                            </button>
                        </form>

                        <hr class="my-3">
                        <p class="text-center text-muted mb-0">
                            ¿No tienes cuenta?
                            <a href="{% url 'registro' %}" class="fw-semibold text-decoration-none">
                                Regístrate aquí
                            </a>
                        </p>
                    </div>

                    <!-- Tab Administrador -->
                    <div class="tab-pane fade p-4" id="administrador" role="tabpanel">
                        <div class="alert alert-info border-0">
                            <i class="bi bi-info-circle"></i>
                            Ingresa con tu cuenta de administrador del sistema.
                        </div>
                        <form method="post">
                            {% csrf_token %}
                            <input type="hidden" name="next" value="{{ next }}">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-shield-person"></i></span>
                                    <input type="text" name="username" class="form-control"
                                           required placeholder="Usuario administrador">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" name="password" class="form-control"
                                           required placeholder="Contraseña">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">
                                <i class="bi bi-shield-lock"></i> Ingresar como Administrador
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <!-- fin card -->

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
